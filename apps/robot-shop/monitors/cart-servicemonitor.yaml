apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cart
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - robot-shop
  selector:
    matchLabels:
      service: cart
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
